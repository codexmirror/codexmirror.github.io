<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grundstücks-Check</title>

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;

  --green:#1f9d55;
  --yellow:#f4b400;
  --red:#d93025;

  --radius:14px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrapper{
  max-width:720px;
  margin:40px auto;
  padding:20px;
}

h1{
  margin:0 0 10px;
  font-size:28px;
  line-height:1.2;
}

p.lead{
  margin:0 0 30px;
  color:var(--muted);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:18px;
}

label{
  font-weight:600;
  display:block;
  margin-bottom:8px;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  font-size:15px;
  background:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  background:#0f172a;
  color:#fff;
  margin-top:10px;
}

.result{
  margin-top:30px;
  padding:20px;
  border-radius:var(--radius);
  border:1px solid var(--line);
  background:#fff;
  display:none;
}

.ampel{
  font-weight:800;
  font-size:20px;
  margin-bottom:10px;
}

.green{color:var(--green)}
.yellow{color:var(--yellow)}
.red{color:var(--red)}

ul{
  padding-left:18px;
  margin:10px 0 0;
  color:var(--muted);
  font-size:14px;
}

small{
  display:block;
  margin-top:20px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>

<div class="wrapper">

  <h1>Grundstücks-Check</h1>
  <p class="lead">6 Fragen → Ampel-Ergebnis. Keine Datenerfassung.</p>

  <div class="card">
    <label>Lage</label>
    <select id="lage">
      <option value="">Bitte wählen</option>
      <option value="innen">Innenbereich</option>
      <option value="aussen">Außenbereich</option>
      <option value="unklar">Unklar</option>
    </select>
  </div>

  <div class="card">
    <label>Bebauungsplan</label>
    <select id="bplan">
      <option value="">Bitte wählen</option>
      <option value="ja">Ja</option>
      <option value="nein">Nein</option>
      <option value="unbekannt">Unbekannt</option>
    </select>
  </div>

  <div class="card">
    <label>Grundstückstyp</label>
    <select id="typ">
      <option value="">Bitte wählen</option>
      <option value="wald">Waldfläche</option>
      <option value="land">Landwirtschaftlich</option>
      <option value="freizeit">Freizeitgrundstück</option>
      <option value="bauluecke">Baulücke</option>
      <option value="sonst">Sonstiges</option>
    </select>
  </div>

  <div class="card">
    <label>Nutzung</label>
    <select id="nutzung">
      <option value="">Bitte wählen</option>
      <option value="wohnen">Dauerhaft wohnen</option>
      <option value="wochenend">Wochenend</option>
      <option value="tiny">Tiny House</option>
      <option value="priv">Landwirtschaftlich privilegiert</option>
      <option value="gewerbe">Gewerblich</option>
    </select>
  </div>

  <div class="card">
    <label>Bestand</label>
    <select id="bestand">
      <option value="">Bitte wählen</option>
      <option value="genehmigt">Genehmigt</option>
      <option value="unklar">Unklar</option>
      <option value="unbebaut">Unbebaut</option>
    </select>
  </div>

  <div class="card">
    <label>Erschließung</label>
    <select id="erschliessung">
      <option value="">Bitte wählen</option>
      <option value="voll">Voll</option>
      <option value="teilweise">Teilweise</option>
      <option value="unklar">Unklar / nicht vorhanden</option>
    </select>
  </div>

  <button onclick="compute()">Ergebnis berechnen</button>

  <div id="result" class="result">
    <div id="ampel" class="ampel"></div>
    <div id="score"></div>
    <ul id="begruendung"></ul>
  </div>

  <small>Hinweis: Keine Rechtsberatung. Strukturierte Ersteinschätzung nach typischen BauGB-Kriterien.</small>

</div>

<script>
function compute(){

  let score = 50;

  const lage = document.getElementById("lage").value;
  const bplan = document.getElementById("bplan").value;
  const typ = document.getElementById("typ").value;
  const nutzung = document.getElementById("nutzung").value;
  const bestand = document.getElementById("bestand").value;
  const erschliessung = document.getElementById("erschliessung").value;

  if(lage==="innen") score+=30;
  if(lage==="aussen") score-=25;

  if(bplan==="ja") score+=15;

  if(typ==="wald") score-=20;
  if(typ==="freizeit") score-=15;
  if(typ==="bauluecke") score+=10;

  if(nutzung==="priv") score+=20;
  if(nutzung==="gewerbe") score-=5;

  if(nutzung==="wohnen" && lage==="aussen") score-=20;
  if(nutzung==="tiny" && lage==="aussen") score-=20;
  if(nutzung==="tiny" && lage!=="aussen") score-=5;
  if(nutzung==="wochenend" && lage==="aussen") score-=10;

  if(bestand==="genehmigt") score+=10;

  if(erschliessung==="voll") score+=10;
  if(erschliessung==="teilweise") score+=5;
  if(erschliessung==="unklar") score-=15;

  if(score>100) score=100;
  if(score<0) score=0;

  let ampel="Gelb";
  let klasse="yellow";

  if(score>=70){ ampel="Grün"; klasse="green";}
  if(score<40){ ampel="Rot"; klasse="red";}

  document.getElementById("result").style.display="block";
  document.getElementById("ampel").textContent=ampel;
  document.getElementById("ampel").className="ampel "+klasse;
  document.getElementById("score").textContent="Score: "+score+"/100";

  const begr = document.getElementById("begruendung");
  begr.innerHTML="";
  begr.innerHTML += "<li>Lage: "+lage+"</li>";
  begr.innerHTML += "<li>B-Plan: "+bplan+"</li>";
  begr.innerHTML += "<li>Nutzung: "+nutzung+"</li>";
}
</script>

</body>
</html>
