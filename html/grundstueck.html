<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grundstücks-Check</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --g:#16a34a; --y:#f59e0b; --r:#dc2626; --rad:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:780px;margin:32px auto;padding:16px}
    h1{margin:0 0 8px;font-size:26px}
    p{margin:0 0 16px;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:14px;margin:12px 0}
    label{display:block;font-weight:650;margin:0 0 6px}
    select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:14px}
    button{width:100%;padding:14px;border:0;border-radius:12px;background:#0f172a;color:#fff;font-weight:750;font-size:15px;cursor:pointer}
    .result{display:none;margin-top:14px}
    .badge{display:inline-block;font-weight:800;font-size:18px}
    .g{color:var(--g)} .y{color:var(--y)} .r{color:var(--r)}
    ul{margin:10px 0 0;padding-left:18px;color:var(--muted)}
    small{display:block;margin-top:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Grundstücks-Check</h1>
    <p>Kurzer Reality-Check (ohne Datenerfassung). Keine Rechtsberatung – nur Orientierung.</p>

    <div class="card">
      <label for="lage">Lage</label>
      <select id="lage">
        <option value="">Bitte wählen</option>
        <option value="innen">Innenbereich (im Ort/zusammenhängend bebaut)</option>
        <option value="aussen">Außenbereich (außerhalb geschlossener Bebauung)</option>
        <option value="unklar">Unklar</option>
      </select>
    </div>

    <div class="card">
      <label for="bplan">Bebauungsplan vorhanden?</label>
      <select id="bplan">
        <option value="">Bitte wählen</option>
        <option value="ja">Ja</option>
        <option value="nein">Nein</option>
        <option value="unklar">Unklar</option>
      </select>
    </div>

    <div class="card">
      <label for="typ">Grundstückstyp</label>
      <select id="typ">
        <option value="">Bitte wählen</option>
        <option value="wald">Waldfläche</option>
        <option value="freizeit">Freizeitgrundstück</option>
        <option value="land">Landwirtschaftliche Fläche</option>
        <option value="bauluecke">Baulücke im Ort</option>
        <option value="sonst">Sonstiges / Unklar</option>
      </select>
    </div>

    <div class="card">
      <label for="nutzung">Geplante Nutzung</label>
      <select id="nutzung">
        <option value="">Bitte wählen</option>
        <option value="wohnen">Dauerhaft wohnen</option>
        <option value="tiny">Tiny House (Wohnen)</option>
        <option value="wochenend">Wochenendnutzung</option>
        <option value="priv">Landwirtschaftlich privilegiert (echter Betrieb)</option>
        <option value="gewerbe">Gewerblich</option>
      </select>
    </div>

    <button id="go" type="button">Ergebnis berechnen</button>

    <div class="card result" id="result">
      <div class="badge" id="ampel"></div>
      <ul id="reasons"></ul>
      <small>Hinweis: Vereinfachte Einschätzung. Verbindlich ist am Ende Gemeinde/Bauamt.</small>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    $("go").addEventListener("click", () => {
      const lage = $("lage").value;
      const bplan = $("bplan").value;
      const typ = $("typ").value;
      const nutz = $("nutzung").value;

      // Pflichtfelder
      if (!lage || !bplan || !typ || !nutz) {
        alert("Bitte alle Felder auswählen.");
        return;
      }

      // Grundlogik: simpel, aber nicht komplett dumm
      let color = "y"; // default gelb
      const reasons = [];

      // Harte Realitätsbremsen
      if ((typ === "wald") && (nutz === "wohnen" || nutz === "tiny")) {
        color = "r";
        reasons.push("Wald + Wohnen/Tiny House ist in der Praxis meist sehr unwahrscheinlich.");
      }

      if (lage === "aussen" && (nutz === "wohnen" || nutz === "tiny") && typ !== "land") {
        color = "r";
        reasons.push("Außenbereich + Wohnen ist planungsrechtlich stark eingeschränkt (oft sehr unwahrscheinlich).");
      }

      // Grün-Fall (klassisch)
      if (color !== "r" && lage === "innen" && bplan === "ja" && typ === "bauluecke") {
        color = "g";
        reasons.push("Innenbereich + Bebauungsplan + Baulücke: grundsätzlich gute Ausgangslage.");
      }

      // Gelbe Fälle (Einzelfall/Details)
      if (color === "y") {
        if (lage === "unklar") reasons.push("Innen-/Außenbereich ist unklar – das ist der wichtigste Faktor.");
        if (bplan === "unklar") reasons.push("Bebauungsplan unklar – ohne den bleibt vieles ein Einzelfall.");
        if (lage === "aussen" && nutz === "wochenend") reasons.push("Außenbereich + Wochenendnutzung ist oft schwierig und genehmigungsabhängig.");
        if (typ === "freizeit") reasons.push("Freizeitgrundstücke sind häufig nicht für Wohnen gedacht – Details entscheiden.");
        if (nutz === "priv") reasons.push("Privilegierung greift nur bei echtem landwirtschaftlichem Betrieb und passenden Vorhaben.");
        if (reasons.length === 0) reasons.push("Details entscheiden (Satzungen, Nutzung, Nachbarschaft, konkrete Planung).");
      }

      // Output
      const ampel = $("ampel");
      const ul = $("reasons");
      ul.innerHTML = "";
      reasons.forEach(r => {
        const li = document.createElement("li");
        li.textContent = r;
        ul.appendChild(li);
      });

      if (color === "g") { ampel.textContent = "🟢 Grundsätzlich möglich"; ampel.className = "badge g"; }
      if (color === "y") { ampel.textContent = "🟡 Stark eingeschränkt / Einzelfall"; ampel.className = "badge y"; }
      if (color === "r") { ampel.textContent = "🔴 Sehr unwahrscheinlich"; ampel.className = "badge r"; }

      $("result").style.display = "block";
      $("result").scrollIntoView({behavior:"smooth", block:"start"});
    });
  </script>
</body>
</html>
