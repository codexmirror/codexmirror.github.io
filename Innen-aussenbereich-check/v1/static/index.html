<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innenbereich / Außenbereich Check (MVP)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; line-height: 1.45; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
    input { width: 100%; padding: 10px; margin-bottom: 8px; }
    button { padding: 10px 14px; cursor: pointer; }
    .muted { color: #666; font-size: 0.95rem; }
    .error { color: #b00020; }
    ul { margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Innenbereich / Außenbereich Check</h1>
  <p class="muted">Technische Ersteinschätzung auf Basis von OSM-Umgebungsdaten (MVP).</p>

  <div class="card">
    <label for="address">Adresse</label>
    <input id="address" type="text" placeholder="z. B. Musterstraße 1, 10115 Berlin" />
    <button id="checkBtn">Check starten</button>
    <p id="status" class="muted"></p>
  </div>

  <div id="result" class="card" style="display:none;"></div>

  <script>
    const addressInput = document.getElementById('address');
    const checkBtn = document.getElementById('checkBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderSignals(signals) {
      return `
        <ul>
          <li>building_count_80m: ${signals.building_count_80m}</li>
          <li>building_count_150m: ${signals.building_count_150m}</li>
          <li>building_count_250m: ${signals.building_count_250m}</li>
          <li>near_density_ratio: ${signals.near_density_ratio}</li>
          <li>median_distance_m: ${signals.median_distance_m ?? 'null'}</li>
          <li>sector_coverage: ${signals.sector_coverage}</li>
          <li>edge_index: ${signals.edge_index}</li>
          <li>half_ring_dominance: ${signals.half_ring_dominance}</li>
          <li>road_distance: ${signals.road_distance}</li>
          <li>building_area_ratio: ${signals.building_area_ratio}</li>
          <li>rural_landuse_signal: ${signals.rural_landuse_signal}</li>
        </ul>
      `;
    }

    checkBtn.addEventListener('click', async () => {
      const address = addressInput.value.trim();
      resultEl.style.display = 'none';
      resultEl.classList.remove('error');

      if (!address) {
        statusEl.textContent = 'Bitte eine Adresse eingeben.';
        return;
      }

      checkBtn.disabled = true;
      statusEl.textContent = 'Analyse läuft…';

      try {
        const response = await fetch('/api/innen-aussen-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address })
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Fehler bei der Analyse');
        }

        resultEl.innerHTML = `
          <h2>Ergebnis</h2>
          <p><strong>Klassifikation:</strong> ${escapeHtml(data.classification)}</p>
          <p><strong>Score:</strong> ${escapeHtml(data.score)}</p>
          <p><strong>Signale:</strong></p>
          ${renderSignals(data.signals)}
          <p><strong>Erklärung:</strong></p>
          <ul>${data.explanation.map(line => `<li>${escapeHtml(line)}</li>`).join('')}</ul>
          <p class="muted"><strong>Disclaimer:</strong> ${escapeHtml(data.disclaimer)}</p>
        `;
      } catch (err) {
        resultEl.classList.add('error');
        resultEl.innerHTML = `<strong>Fehler:</strong> ${escapeHtml(err.message)}`;
      } finally {
        resultEl.style.display = 'block';
        checkBtn.disabled = false;
        statusEl.textContent = '';
      }
    });
  </script>
</body>
</html>
